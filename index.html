<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>通用 AI 聊天 · 莫兰迪陪伴</title>
    <link rel="manifest" href="data:application/manifest+json,{
        %22name%22:%22%E9%80%9A%E7%94%A8%20AI%20%E8%81%8A%E5%A4%A9%22,
        %22short_name%22:%22AI%E8%81%8A%E5%A4%A9%22,
        %22start_url%22:%22.%22,
        %22display%22:%22standalone%22,
        %22theme_color%22:%22%23E6DCD0%22,
        %22background_color%22:%22%23F5F0F0%22,
        %22icons%22:[{
            %22src%22:%22data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20fill%3D%22%23D9CEC3%22%2F%3E%3Ctext%20x%3D%2250%22%20y%3D%2275%22%20font-size%3D%2270%22%20text-anchor%3D%22middle%22%20fill%3D%22%23FFFFFF%22%3E%F0%9F%92%AC%3C%2Ftext%3E%3C%2Fsvg%3E%22,
            %22sizes%22:%22any%22
        }]
    }">
    <meta name="theme-color" content="#E6DCD0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, 'Helvetica Neue', sans-serif;
            background: #e8e8e5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-app {
            width: 100%; max-width: 750px; height: 100vh; margin: 8px;
            background: #F5F0F0; border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; position: relative;
        }
        .chat-app::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background-image: radial-gradient(circle at 25% 40%, rgba(210,190,170,0.08) 1.5px, transparent 1.5px), radial-gradient(circle at 70% 85%, rgba(180,160,140,0.06) 1px, transparent 1px);
            background-size: 40px 40px, 30px 30px; border-radius: 32px;
        }
        .chat-header {
            padding: 10px 16px;
            background: #F5F0F0;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 10; flex-shrink: 0;
            gap: 8px;
        }
        .chat-header h1 { font-size: 1.6rem; font-weight: 500; color: #4F3F35; letter-spacing: -0.3px; white-space: nowrap; }
        .header-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .header-model-select {
            background: #F0EAE4; border: none; border-radius: 20px;
            padding: 6px 12px; font-size: 14px; color: #4F3F35;
            outline: none; cursor: pointer; max-width: 140px;
            appearance: auto; -webkit-appearance: auto;
        }
        .settings-icon {
            font-size: 1.6rem; cursor: pointer; padding: 6px; background: #F0EAE4; border-radius: 30px;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: 0.2s; color: #8F7A6B;
        }
        .settings-icon:active { background: #E1D5CA; }
        .settings-panel {
            display: none; background: #FEFCF9; margin: 0 16px 12px; padding: 16px; border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05); border: 1px solid #E9DFD5; z-index: 10; max-height: 65vh; overflow-y: auto;
        }
        .settings-panel label { font-size: 13px; color: #7F6B5C; margin-top: 12px; display: block; }
        .settings-panel input, .settings-panel select, .settings-panel textarea {
            width: 100%; padding: 10px 14px; margin-top: 4px; border-radius: 16px; border: 1px solid #E3D7CE;
            background: #FFFFFF; font-family: inherit; font-size: 14px; outline: none;
        }
        .api-input-group { position: relative; margin-top: 4px; }
        .api-input-group input { width: 100%; padding-right: 40px; margin-top: 0; }
        .toggle-password {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer;
            font-size: 18px; color: #8F7A6B; background: none; border: none; padding: 0;
        }
        .settings-panel textarea { resize: vertical; min-height: 80px; }
        .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
        .btn-row button {
            padding: 8px 16px; border-radius: 40px; border: none; font-size: 13px; font-weight: 500; cursor: pointer;
            background: #EFE6DF; color: #5D4A3A; transition: 0.1s;
        }
        .btn-row button:active { transform: scale(0.96); }
        .btn-row .btn-primary { background: #D9CEC3; color: #3E2E24; }
        .btn-row .btn-warning { background: #EAC8B0; color: #5C3F2A; }
        .btn-row .btn-danger { background: #EAD5CD; color: #8B5A4B; }
        .btn-row .btn-memory { background: #CFE0D0; color: #3E4A3A; }
        .btn-row .btn-edit-models { background: #BFCEE0; color: #3A3E4A; }
        .btn-row .btn-reset-models { background: #F0E0C0; color: #6B4E3A; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 12px 20px 20px; display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth; background: #F5F0F0;
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: #E6DDD5; border-radius: 10px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #CFC1B6; border-radius: 10px; }
        .message { display: flex; max-width: 88%; animation: fadeSlideUp 0.2s ease; position: relative; }
        .user-message { align-self: flex-end; justify-content: flex-end; }
        .ai-message { align-self: flex-start; justify-content: flex-start; }
        .bubble {
            padding: 14px 20px; border-radius: 24px; font-size: 17px; line-height: 1.5;
            word-break: break-word; white-space: pre-wrap; box-shadow: 0 1px 1.5px rgba(0,0,0,0.02);
        }
        .user-message .bubble { background: #F2E3E3; color: #2C2C2C; border-bottom-right-radius: 6px; border: none; }
        .ai-message .bubble { background: #F0E8E8; color: #2C2C2C; border-bottom-left-radius: 6px; border: 1px solid #E8DCD2; }
        .image-bubble {
            background: #F2E3E3; border: none; border-radius: 20px; border-bottom-right-radius: 6px;
            padding: 8px; max-width: 220px; cursor: pointer; position: relative;
        }
        .image-bubble img { width: 100%; border-radius: 16px; display: block; pointer-events: none; }
        .time { font-size: 11px; color: #A09080; margin-top: 6px; display: block; letter-spacing: 0.2px; }
        .context-menu {
            position: fixed; background: #FEFCF9; backdrop-filter: blur(8px); border-radius: 20px;
            padding: 8px 0; min-width: 160px; z-index: 1000; box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            border: 1px solid #E9DFD5; animation: fadeScale 0.15s ease;
        }
        .context-menu button {
            background: none; border: none; width: 100%; text-align: left; padding: 12px 20px;
            font-size: 16px; color: #4F3F35; display: flex; align-items: center; gap: 12px; cursor: pointer; font-weight: 500;
        }
        .context-menu button:active { background: #F1EAE4; }
        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .input-wrapper {
            background: rgba(255,253,250,0.96); backdrop-filter: blur(4px); border-top: 1px solid #EBE1D8;
            padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom, 12px));
            display: flex; align-items: center; gap: 8px;
            position: sticky; bottom: 0; z-index: 10; flex-shrink: 0;
        }
        .plus-button {
            background: #F0E9E3; border: none; width: 42px; height: 42px; border-radius: 50%;
            font-size: 24px; display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: #8C7767; transition: all 0.2s ease; flex-shrink: 0;
        }
        .plus-button:active { background: #E3D6CD; transform: scale(0.96); }
        .action-menu {
            position: fixed; bottom: 90px; left: 20px; background: #FFFFFFF0; backdrop-filter: blur(20px);
            border-radius: 32px; padding: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); border: 1px solid #EBE1D8;
            display: none; flex-direction: column; gap: 8px; z-index: 20; min-width: 160px;
        }
        .action-menu button {
            background: transparent; border: none; padding: 12px 24px; font-size: 16px;
            display: flex; align-items: center; gap: 12px; border-radius: 28px; width: 100%; text-align: left; cursor: pointer; color: #4F3F35;
        }
        .action-menu button:active { background: #F1EAE4; }
        .action-menu.show { display: flex; }
        .input-container {
            flex: 1; background: #FEFCF9; border-radius: 50px; border: 1px solid #EADFD5;
            padding: 4px 18px; display: flex; align-items: center; min-width: 0;
        }
        .input-container input {
            flex: 1; border: none; background: transparent; padding: 12px 0; font-size: 17px;
            outline: none; font-family: inherit; color: #2C2C2C; min-width: 0;
        }
        .send-btn {
            background: #E8DDD2; border: none; width: 42px; height: 42px; border-radius: 50%;
            font-size: 22px; display: flex; align-items: center; justify-content: center; cursor: pointer;
            color: #6C5847; transition: 0.2s; flex-shrink: 0;
        }
        .send-btn:active { background: #D9CABE; transform: scale(0.96); }
        .send-btn:disabled { opacity: 0.5; }
        .image-viewer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center;
            z-index: 1000; cursor: pointer; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .image-viewer.show { visibility: visible; opacity: 1; }
        .image-viewer img { max-width: 90%; max-height: 80%; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .loading-dots span {
            display: inline-block; width: 9px; height: 9px; background: #CBBBAE; border-radius: 50%;
            margin: 0 3px; animation: wave 1.2s infinite;
        }
        @keyframes wave { 0%,60%,100%{ transform: translateY(0); opacity: 0.5; } 30%{ transform: translateY(-6px); opacity: 1; } }
        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .hidden-file { display: none; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 1001; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal-overlay.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: #FEFCF9; border-radius: 24px; padding: 20px;
            max-width: 500px; max-height: 80vh; overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); border: 1px solid #E9DFD5;
            width: 90%;
        }
        .modal-content h3 { margin-bottom: 12px; color: #4F3F35; }
        .modal-content .model-edit-row {
            display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; align-items: center;
        }
        .modal-content .model-edit-row input {
            flex: 1; min-width: 60px; padding: 6px 10px; border: 1px solid #E3D7CE;
            border-radius: 12px; font-size: 13px; background: #FFFFFF;
        }
        .modal-content .model-edit-row button {
            background: #EAD5CD; color: #8B5A4B; border: none; padding: 6px 10px; border-radius: 12px;
            cursor: pointer; font-size: 13px;
        }
        .modal-content .add-model-btn {
            background: #CFE0D0; color: #3E4A3A; border: none; padding: 8px 16px;
            border-radius: 20px; margin-top: 8px; cursor: pointer; font-size: 14px;
        }
        .modal-content .close-modal-btn {
            background: #D9CEC3; color: #3E2E24; border: none; padding: 8px 16px;
            border-radius: 20px; margin-top: 12px; cursor: pointer; font-size: 14px; margin-right: 8px;
        }
        .modal-content .save-close-btn {
            background: #CFE0D0; color: #3E4A3A; border: none; padding: 8px 16px;
            border-radius: 20px; margin-top: 12px; cursor: pointer; font-size: 14px;
        }
    </style>
</head>
<body>
<div class="chat-app">
    <div class="chat-header">
        <h1>💫 通用 AI 聊天</h1>
        <div class="header-controls">
            <select id="headerModelSelect" class="header-model-select"></select>
            <div class="settings-icon" onclick="toggleSettings()">⚙️</div>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <label>🤖 模型模式</label>
        <select id="modeSelect"></select>
        <div id="freeConfig" class="provider-config" style="display:none;">
            <div style="background:#E8F0E8; padding:8px; border-radius:12px; margin-bottom:8px;">✅ 免费模型，无需 API Key</div>
        </div>
        <div id="deepseekConfig" class="provider-config" style="display:none;">
            <label>🔑 API Key</label><div class="api-input-group"><input type="password" id="dsApiKey" placeholder="sk-..."><button class="toggle-password" onclick="togglePassword('dsApiKey')">👁️</button></div>
            <label>🌐 Base URL</label><input type="text" id="dsBaseUrl" value="https://api.deepseek.com">
            <label>🧠 模型</label><select id="dsModelSelect"></select>
        </div>
        <div id="zhipuConfig" class="provider-config" style="display:none;">
            <label>🔑 API Key</label><div class="api-input-group"><input type="password" id="zpApiKey" placeholder="智谱 API Key"><button class="toggle-password" onclick="togglePassword('zpApiKey')">👁️</button></div>
            <label>🌐 Base URL</label><input type="text" id="zpBaseUrl" value="https://open.bigmodel.cn/api/paas/v4">
            <label>🧠 模型</label><select id="zpModelSelect"></select>
        </div>
        <div id="openaiConfig" class="provider-config" style="display:none;">
            <label>🔑 API Key</label><div class="api-input-group"><input type="password" id="oaApiKey" placeholder="sk-..."><button class="toggle-password" onclick="togglePassword('oaApiKey')">👁️</button></div>
            <label>🌐 Base URL</label><input type="text" id="oaBaseUrl" value="https://api.openai.com">
            <label>🧠 模型</label><select id="oaModelSelect"></select>
        </div>
        <div id="customConfig" class="provider-config" style="display:none;">
            <label>🔑 API Key</label><div class="api-input-group"><input type="password" id="cuApiKey"><button class="toggle-password" onclick="togglePassword('cuApiKey')">👁️</button></div>
            <label>🌐 Base URL</label><input type="text" id="cuBaseUrl">
            <label>🧠 模型名称</label><input type="text" id="cuModelName">
        </div>
        <label>🎭 系统 Prompt（人设）</label>
        <textarea id="systemPrompt" placeholder="在这里设置系统提示词（例如：你是一个有帮助的助手）"></textarea>
        <div class="btn-row">
            <button class="btn-primary" onclick="saveSettings()">💾 保存设置</button>
            <button class="btn-warning" onclick="exportChat()">📥 导出记录</button>
            <button class="btn-memory" onclick="exportMemory()">📚 导出全部记忆</button>
            <button class="btn-memory" onclick="clearMemoryOnly()">🧹 清除全部记忆</button>
            <button class="btn-danger" onclick="clearChat()">🗑️ 清空对话</button>
            <button class="btn-edit-models" onclick="openModelEditor()">📋 编辑模型列表</button>
            <button class="btn-reset-models" onclick="resetModelList()">⟳ 重置模型列表为默认</button>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>

    <div class="input-wrapper">
        <button class="plus-button" id="plusBtn">+</button>
        <div class="input-container">
            <input type="text" id="messageInput" placeholder="说点什么..." autocomplete="off">
        </div>
        <button class="send-btn" id="sendBtn">➤</button>
    </div>

    <div class="action-menu" id="actionMenu">
        <button id="uploadImageBtn">📷 上传图片</button>
        <button id="uploadMemoryBtn">📂 导入记忆</button>
    </div>

    <input type="file" id="imageFileInput" accept="image/*" class="hidden-file">
    <input type="file" id="memoryFileInput" accept=".txt" class="hidden-file">

    <div id="imageViewer" class="image-viewer" onclick="closeImageViewer()">
        <img id="viewerImg" src="">
    </div>
</div>

<div class="modal-overlay" id="modelEditorModal">
    <div class="modal-content">
        <h3>编辑模型列表</h3>
        <div id="modelEditorContainer"></div>
        <button class="add-model-btn" onclick="addNewModel()">+ 新增模型</button>
        <div style="margin-top: 16px;">
            <button class="close-modal-btn" onclick="closeModelEditor(false)">取消</button>
            <button class="save-close-btn" onclick="closeModelEditor(true)">保存并关闭</button>
        </div>
    </div>
</div>

<script>
    // ---------- 默认模型配置（包含免费模型 Pollinations.ai） ----------
    const MODEL_CONFIG_VERSION = 3;  // 版本号升级，强制更新
    const DEFAULT_MODELS = [
        { id: 'free', name: '免费模型 (Pollinations.ai)', endpoint: 'https://text.pollinations.ai/openai', auth: 'none', models: ['openai'], note: '无需 API Key，完全免费' },
        { id: 'deepseek', name: 'DeepSeek', endpoint: 'https://api.deepseek.com', auth: 'Bearer', models: ['deepseek-v4-pro', 'deepseek-v4-flash'], note: '新用户500万Token，每月100万' },
        { id: 'zhipu', name: '智谱 GLM', endpoint: 'https://open.bigmodel.cn/api/paas/v4', auth: 'Bearer', models: ['GLM-4.7-Flash', 'GLM-4.5-Air', 'GLM-5.1', 'GLM-5V-Turbo'], note: 'GLM-4.7-Flash永久免费，新用户再送2000万Token' },
        { id: 'google', name: 'Google Gemini', endpoint: 'https://generativelanguage.googleapis.com/v1beta', auth: 'x-goog-api-key', models: ['gemini-2.5-flash'], note: '每日20次免费请求' },
        { id: 'qwen', name: '阿里千问', endpoint: 'https://dashscope.aliyuncs.com/compatible-mode/v1', auth: 'Bearer', models: ['Qwen3.6-Plus', 'Qwen3.7-Max'], note: '新用户送超7000万Token（90天有效）' },
        { id: 'openrouter', name: 'OpenRouter', endpoint: 'https://openrouter.ai/api/v1', auth: 'Bearer', models: ['meta-llama/llama-3.3-70b-instruct:free', 'google/gemma-2-9b-it:free', 'qwen/qwen-2.5-72b-instruct:free', 'mistralai/mistral-nemo:free', 'nvidia/nemotron-4-340b-instruct:free', 'deepseek/deepseek-r1:free'], note: '多款免费模型，无调用费' },
        { id: 'qiniu', name: '七牛云AI', endpoint: 'https://api.qiniuai.com/v1', auth: 'Bearer', models: ['Claude', 'DeepSeek', 'Gemini'], note: '新用户600万Token免费' },
        { id: 'shiyun', name: '诗云API', endpoint: 'https://api.shiyun.com/v1', auth: 'Bearer', models: ['Claude', 'DeepSeek', 'Gemini'], note: '新用户50万Token，官价5折起' },
        { id: 'thinkflow', name: '网易ThinkFlow', endpoint: 'https://api.thinkflow.com/v1', auth: 'Bearer', models: ['Claude', 'DeepSeek', 'Gemini'], note: '成本管控最强' },
        { id: 'volcano', name: '火山引擎（豆包）', endpoint: 'https://ark.cn-beijing.volces.com/api/v3', auth: 'Bearer', models: ['Doubao-Seed-2.0-Pro'], note: '个人可申请，新用户有免费额度' },
        { id: 'mimo', name: '小米MiMo', endpoint: 'https://api.mimo.xiaomi.com', auth: 'Bearer', models: ['MiMo-V2.5-Pro'], note: '100万超长上下文' },
        { id: 'claude', name: 'Anthropic Claude', endpoint: 'https://api.anthropic.com/v1', auth: 'x-api-key', models: ['claude-opus-4-7', 'claude-sonnet-4-6'], note: '编程能力顶级' },
        { id: 'openai', name: 'OpenAI GPT', endpoint: 'https://api.openai.com/v1', auth: 'Bearer', models: ['gpt-5.5-pro', 'gpt-5.5-flash'], note: '综合能力最强' },
        { id: 'custom', name: '自定义兼容接口', endpoint: '', auth: 'Bearer', models: [], note: '灵活扩展' }
    ];

    let modelConfigs = [];

    function loadModelConfigs() {
        const savedVersion = localStorage.getItem('modelConfigVersion');
        const saved = localStorage.getItem('modelConfigs');
        if (saved && savedVersion == MODEL_CONFIG_VERSION) {
            try { modelConfigs = JSON.parse(saved); } catch(e) { modelConfigs = []; }
        }
        if (!modelConfigs || modelConfigs.length === 0) {
            modelConfigs = JSON.parse(JSON.stringify(DEFAULT_MODELS));
            localStorage.setItem('modelConfigVersion', MODEL_CONFIG_VERSION);
            saveModelConfigs();
        }
    }

    function clearMemoryOnly() {
        if (confirm('确定要清空所有导入的历史记忆吗？这不会影响聊天记录和设置。')) {
            localStorage.removeItem('accumulated_memory');
            alert('✅ 历史记忆已清空。');
            location.reload();
        }
    }

    function saveModelConfigs() {
        localStorage.setItem('modelConfigs', JSON.stringify(modelConfigs));
        localStorage.setItem('modelConfigVersion', MODEL_CONFIG_VERSION);
    }

    function resetModelList() {
        if (confirm('重置模型列表将恢复为默认配置，当前编辑的模型会丢失。确定吗？')) {
            modelConfigs = JSON.parse(JSON.stringify(DEFAULT_MODELS));
            saveModelConfigs();
            populateSelectors();
            alert('模型列表已重置为默认。');
        }
    }

    function populateSelectors() {
        const headerSelect = document.getElementById('headerModelSelect');
        const modeSelect = document.getElementById('modeSelect');
        headerSelect.innerHTML = '';
        modeSelect.innerHTML = '';
        modelConfigs.forEach((cfg) => {
            const option = document.createElement('option');
            option.value = cfg.id;
            option.textContent = cfg.name;
            headerSelect.appendChild(option.cloneNode(true));
            modeSelect.appendChild(option.cloneNode(true));
        });
        if (currentMode && modelConfigs.some(c => c.id === currentMode)) {
            headerSelect.value = currentMode;
            modeSelect.value = currentMode;
        } else if (modelConfigs.length > 0) {
            currentMode = modelConfigs[0].id;
            headerSelect.value = currentMode;
            modeSelect.value = currentMode;
        }
        onModeChange();
    }

    function getCurrentModelConfig() {
        return modelConfigs.find(c => c.id === currentMode) || modelConfigs[0];
    }

    let currentMode = '';
    let conversationHistory = [];
    let pendingImage = null;

    const DEFAULT_PROMPT = `你是一个有帮助、友好、诚实的AI助手。请用清晰、简洁的语言回答问题。`;

    const messagesContainer = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const plusBtn = document.getElementById('plusBtn');
    const actionMenu = document.getElementById('actionMenu');
    const uploadImageBtn = document.getElementById('uploadImageBtn');
    const uploadMemoryBtn = document.getElementById('uploadMemoryBtn');
    const imageFileInput = document.getElementById('imageFileInput');
    const memoryFileInput = document.getElementById('memoryFileInput');
    const imageViewer = document.getElementById('imageViewer');
    const viewerImg = document.getElementById('viewerImg');
    const headerModelSelect = document.getElementById('headerModelSelect');
    const modeSelect = document.getElementById('modeSelect');

    function togglePassword(inputId) {
        const input = document.getElementById(inputId);
        if(input.type === 'password') input.type = 'text';
        else input.type = 'password';
    }

    function onModeChange() {
        currentMode = modeSelect.value;
        headerModelSelect.value = currentMode;
        document.querySelectorAll('.provider-config').forEach(el => el.style.display = 'none');
        const cfg = getCurrentModelConfig();
        if (currentMode === 'free') {
            const panel = document.getElementById('freeConfig');
            if (panel) panel.style.display = 'block';
        } else if (currentMode === 'deepseek') {
            const panel = document.getElementById('deepseekConfig');
            if (panel) panel.style.display = 'block';
            const dsSel = document.getElementById('dsModelSelect');
            if (dsSel) {
                dsSel.innerHTML = '';
                (cfg.models || []).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    dsSel.appendChild(opt);
                });
                dsSel.value = localStorage.getItem('ds_model') || cfg.models[0];
            }
        } else if (currentMode === 'zhipu' || currentMode === 'openrouter' || currentMode === 'google' || currentMode === 'qwen' || currentMode === 'qiniu' || currentMode === 'shiyun' || currentMode === 'thinkflow' || currentMode === 'volcano' || currentMode === 'mimo' || currentMode === 'claude') {
            const panel = document.getElementById('zhipuConfig');
            if (panel) panel.style.display = 'block';
            const zpSel = document.getElementById('zpModelSelect');
            if (zpSel) {
                zpSel.innerHTML = '';
                (cfg.models || []).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    zpSel.appendChild(opt);
                });
                zpSel.value = localStorage.getItem('zp_model') || cfg.models[0];
            }
        } else if (currentMode === 'openai') {
            const panel = document.getElementById('openaiConfig');
            if (panel) panel.style.display = 'block';
            const oaSel = document.getElementById('oaModelSelect');
            if (oaSel) {
                oaSel.innerHTML = '';
                (cfg.models || []).forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m; opt.textContent = m;
                    oaSel.appendChild(opt);
                });
                oaSel.value = localStorage.getItem('oa_model') || cfg.models[0];
            }
        } else if (currentMode === 'custom') {
            document.getElementById('customConfig').style.display = 'block';
        }
    }

    headerModelSelect.addEventListener('change', function() {
        currentMode = this.value;
        modeSelect.value = currentMode;
        onModeChange();
        localStorage.setItem('chat_mode', currentMode);
    });
    modeSelect.addEventListener('change', function() {
        currentMode = this.value;
        headerModelSelect.value = currentMode;
        onModeChange();
        localStorage.setItem('chat_mode', currentMode);
    });

    function loadSettings() {
        loadModelConfigs();
        let savedMode = localStorage.getItem('chat_mode');
        if (savedMode === 'free') savedMode = 'free';
        currentMode = savedMode || modelConfigs[0]?.id || 'free';
        populateSelectors();
        document.getElementById('systemPrompt').value = localStorage.getItem('systemPrompt') || DEFAULT_PROMPT;
        document.getElementById('dsApiKey').value = localStorage.getItem('ds_apiKey') || '';
        document.getElementById('dsBaseUrl').value = localStorage.getItem('ds_baseUrl') || 'https://api.deepseek.com';
        document.getElementById('zpApiKey').value = localStorage.getItem('zp_apiKey') || '';
        document.getElementById('zpBaseUrl').value = localStorage.getItem('zp_baseUrl') || 'https://open.bigmodel.cn/api/paas/v4';
        document.getElementById('oaApiKey').value = localStorage.getItem('oa_apiKey') || '';
        document.getElementById('oaBaseUrl').value = localStorage.getItem('oa_baseUrl') || 'https://api.openai.com';
        document.getElementById('cuApiKey').value = localStorage.getItem('cu_apiKey') || '';
        document.getElementById('cuBaseUrl').value = localStorage.getItem('cu_baseUrl') || '';
        document.getElementById('cuModelName').value = localStorage.getItem('cu_modelName') || '';
    }

    function saveSettings() {
        localStorage.setItem('chat_mode', currentMode);
        localStorage.setItem('ds_apiKey', document.getElementById('dsApiKey').value);
        localStorage.setItem('ds_baseUrl', document.getElementById('dsBaseUrl').value);
        localStorage.setItem('ds_model', document.getElementById('dsModelSelect')?.value || '');
        localStorage.setItem('zp_apiKey', document.getElementById('zpApiKey').value);
        localStorage.setItem('zp_baseUrl', document.getElementById('zpBaseUrl').value);
        localStorage.setItem('zp_model', document.getElementById('zpModelSelect')?.value || '');
        localStorage.setItem('oa_apiKey', document.getElementById('oaApiKey').value);
        localStorage.setItem('oa_baseUrl', document.getElementById('oaBaseUrl').value);
        localStorage.setItem('oa_model', document.getElementById('oaModelSelect')?.value || '');
        localStorage.setItem('cu_apiKey', document.getElementById('cuApiKey').value);
        localStorage.setItem('cu_baseUrl', document.getElementById('cuBaseUrl').value);
        localStorage.setItem('cu_modelName', document.getElementById('cuModelName').value);
        localStorage.setItem('systemPrompt', document.getElementById('systemPrompt').value);
        alert('设置已保存'); document.getElementById('settingsPanel').style.display = 'none';
    }

    function toggleSettings() { const panel = document.getElementById('settingsPanel'); panel.style.display = panel.style.display === 'block' ? 'none' : 'block'; }
    function clearChat() {
        if(confirm('清空所有对话？')) { conversationHistory = []; saveHistory(); messagesContainer.innerHTML = ''; addTextMessageToDOM('assistant', '对话已清空。', true); }
    }

    function openImageViewer(src) { viewerImg.src = src; imageViewer.classList.add('show'); }
    function closeImageViewer() { imageViewer.classList.remove('show'); viewerImg.src = ''; }

    let activeMenu = null;
    function closeMenu() { if(activeMenu) { activeMenu.remove(); activeMenu = null; } }

    function deleteMessage(messageDiv, uid) {
        messageDiv.remove();
        const index = conversationHistory.findIndex(item => item.uid === uid);
        if(index !== -1) { conversationHistory.splice(index, 1); saveHistory(); }
        closeMenu();
    }

    function bindTextLongPress(messageDiv, uid) {
        let pressTimer = null;
        const startPress = (e) => { pressTimer = setTimeout(() => { e.preventDefault(); showTextMenu(messageDiv, uid); }, 500); };
        const cancelPress = () => { if(pressTimer) clearTimeout(pressTimer); };
        messageDiv.addEventListener('touchstart', startPress);
        messageDiv.addEventListener('touchend', cancelPress);
        messageDiv.addEventListener('touchmove', cancelPress);
        messageDiv.addEventListener('contextmenu', (e) => { e.preventDefault(); showTextMenu(messageDiv, uid); });
    }

    function showTextMenu(messageDiv, uid) {
        closeMenu();
        const menu = document.createElement('div'); menu.className = 'context-menu';
        const deleteBtn = document.createElement('button'); deleteBtn.innerHTML = '🗑️ 删除消息';
        deleteBtn.onclick = () => deleteMessage(messageDiv, uid);
        menu.appendChild(deleteBtn); document.body.appendChild(menu); activeMenu = menu;
        const rect = messageDiv.getBoundingClientRect();
        menu.style.left = rect.left + 'px'; menu.style.top = (rect.bottom + 5) + 'px';
        const closeHandler = (e) => { if(!menu.contains(e.target)) { closeMenu(); document.removeEventListener('click', closeHandler); document.removeEventListener('touchstart', closeHandler); } };
        setTimeout(() => { document.addEventListener('click', closeHandler); document.addEventListener('touchstart', closeHandler); }, 0);
    }

    function bindImageLongPress(imgDiv, imgSrc, messageDiv, uid) {
        let pressTimer = null;
        const startPress = (e) => { pressTimer = setTimeout(() => { e.preventDefault(); showImageMenu(imgSrc, messageDiv, uid); }, 500); };
        const cancelPress = () => { if(pressTimer) clearTimeout(pressTimer); };
        imgDiv.addEventListener('touchstart', startPress);
        imgDiv.addEventListener('touchend', cancelPress);
        imgDiv.addEventListener('touchmove', cancelPress);
        imgDiv.addEventListener('contextmenu', (e) => { e.preventDefault(); showImageMenu(imgSrc, messageDiv, uid); });
    }

    function showImageMenu(imgSrc, messageDiv, uid) {
        closeMenu();
        const menu = document.createElement('div'); menu.className = 'context-menu';
        const saveBtn = document.createElement('button'); saveBtn.innerHTML = '💾 保存图片';
        saveBtn.onclick = (e) => { e.stopPropagation(); const link = document.createElement('a'); link.href = imgSrc; link.download = `image_${Date.now()}.png`; link.click(); closeMenu(); };
        const deleteBtn = document.createElement('button'); deleteBtn.innerHTML = '🗑️ 删除消息';
        deleteBtn.onclick = () => deleteMessage(messageDiv, uid);
        menu.appendChild(saveBtn); menu.appendChild(deleteBtn); document.body.appendChild(menu); activeMenu = menu;
        const rect = messageDiv.getBoundingClientRect();
        menu.style.left = rect.left + 'px'; menu.style.top = (rect.bottom + 5) + 'px';
        const closeHandler = (e) => { if(!menu.contains(e.target)) { closeMenu(); document.removeEventListener('click', closeHandler); document.removeEventListener('touchstart', closeHandler); } };
        setTimeout(() => { document.addEventListener('click', closeHandler); document.addEventListener('touchstart', closeHandler); }, 0);
    }

    function addTextMessageToDOM(role, content, skipHistory=false, existingUid=null) {
        const div = document.createElement('div'); div.className = `message ${role === 'user' ? 'user-message' : 'ai-message'}`;
        const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.innerText = content;
        const timeSpan = document.createElement('span'); timeSpan.className = 'time';
        timeSpan.innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        bubble.appendChild(timeSpan); div.appendChild(bubble);
        const uid = existingUid || `msg_${Date.now()}_${Math.random()}`; div.dataset.uid = uid;
        messagesContainer.appendChild(div); messagesContainer.scrollTop = messagesContainer.scrollHeight;
        bindTextLongPress(div, uid);
        if(!skipHistory) { conversationHistory.push({role, content, uid}); saveHistory(); }
        return div;
    }

    function addImageMessage(imageBase64, skipHistory=false, existingUid=null) {
        const div = document.createElement('div'); div.className = 'message user-message'; div.style.flexDirection = 'column'; div.style.alignItems = 'flex-end';
        const imgDiv = document.createElement('div'); imgDiv.className = 'image-bubble';
        const img = document.createElement('img'); img.src = imageBase64; imgDiv.appendChild(img);
        const timeSpan = document.createElement('span'); timeSpan.className = 'time';
        timeSpan.innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        imgDiv.appendChild(timeSpan); div.appendChild(imgDiv);
        const uid = existingUid || `img_${Date.now()}_${Math.random()}`; div.dataset.uid = uid;
        imgDiv.addEventListener('click', (e) => { e.stopPropagation(); openImageViewer(imageBase64); });
        bindImageLongPress(imgDiv, imageBase64, div, uid);
        messagesContainer.appendChild(div); messagesContainer.scrollTop = messagesContainer.scrollHeight;
        if(!skipHistory) { conversationHistory.push({role: 'user', image: imageBase64, content: '[图片]', uid}); saveHistory(); }
        return div;
    }

    function addMessage(role, content, skipHistory=false) { addTextMessageToDOM(role, content, skipHistory); }
    function saveHistory() { localStorage.setItem('chatHistory', JSON.stringify(conversationHistory)); }

    function loadHistory() {
        const saved = localStorage.getItem('chatHistory');
        if(saved) {
            try {
                conversationHistory = JSON.parse(saved); messagesContainer.innerHTML = '';
                for(let msg of conversationHistory) {
                    if(msg.image) {
                        const div = document.createElement('div'); div.className = 'message user-message'; div.style.flexDirection = 'column'; div.style.alignItems = 'flex-end';
                        const imgDiv = document.createElement('div'); imgDiv.className = 'image-bubble';
                        const img = document.createElement('img'); img.src = msg.image; imgDiv.appendChild(img);
                        const timeSpan = document.createElement('span'); timeSpan.className = 'time';
                        timeSpan.innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                        imgDiv.appendChild(timeSpan); div.appendChild(imgDiv);
                        const uid = msg.uid || `img_${Date.now()}_${Math.random()}`; div.dataset.uid = uid;
                        imgDiv.addEventListener('click', (e) => { e.stopPropagation(); openImageViewer(msg.image); });
                        bindImageLongPress(imgDiv, msg.image, div, uid);
                        messagesContainer.appendChild(div);
                    } else if(msg.content) { addTextMessageToDOM(msg.role, msg.content, true, msg.uid); }
                }
            } catch(e) {}
        }
        if(conversationHistory.length === 0) addTextMessageToDOM('assistant', '你好！有什么我可以帮你的吗？');
    }

    function exportChat() {
        if(conversationHistory.length === 0) { alert('没有聊天记录可导出'); return; }
        let output = '聊天记录\n========================\n\n';
        conversationHistory.forEach(msg => {
            const role = msg.role === 'user' ? '用户' : 'AI';
            const content = msg.content || (msg.image ? '[图片消息]' : '');
            output += `【${role}】\n${content}\n\n`;
        });
        const blob = new Blob(['\uFEFF' + output], {type: 'text/plain;charset=utf-8'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `聊天记录_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`; a.click();
        URL.revokeObjectURL(a.href);
    }

    function exportMemory() {
        const memory = localStorage.getItem('accumulated_memory');
        if(!memory || memory.trim() === '') { alert('暂无任何导入的记忆内容'); return; }
        const output = `累积记忆\n导出时间：${new Date().toLocaleString()}\n========================\n\n${memory}`;
        const blob = new Blob(['\uFEFF' + output], {type: 'text/plain;charset=utf-8'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `全部记忆_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`; a.click();
        URL.revokeObjectURL(a.href);
    }

    uploadImageBtn.onclick = () => { imageFileInput.click(); actionMenu.classList.remove('show'); };
    uploadMemoryBtn.onclick = () => { memoryFileInput.click(); actionMenu.classList.remove('show'); };
    imageFileInput.onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader(); reader.onload = ev => { pendingImage = ev.target.result; addImageMessage(pendingImage); };
        reader.readAsDataURL(file); imageFileInput.value = '';
    };
    memoryFileInput.onchange = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader(); reader.onload = ev => {
            let mem = localStorage.getItem('accumulated_memory') || ''; mem += '\n' + ev.target.result;
            localStorage.setItem('accumulated_memory', mem); addMessage('assistant', '✅ 记忆已导入。', true);
        };
        reader.readAsText(file, 'UTF-8'); memoryFileInput.value = '';
    };

    function getCurrentApiKey() {
        if (currentMode === 'free') return '';
        switch (currentMode) {
            case 'deepseek': return localStorage.getItem('ds_apiKey');
            case 'zhipu': case 'openrouter': case 'google': case 'qwen': case 'qiniu': case 'shiyun': case 'thinkflow': case 'volcano': case 'mimo': case 'claude':
                return localStorage.getItem('zp_apiKey');
            case 'openai': return localStorage.getItem('oa_apiKey');
            case 'custom': return localStorage.getItem('cu_apiKey');
            default: return '';
        }
    }

    function getCurrentBaseUrl() {
        const cfg = getCurrentModelConfig();
        if (cfg && cfg.endpoint) return cfg.endpoint;
        return '';
    }

    function getCurrentModel() {
        const cfg = getCurrentModelConfig();
        if (cfg && cfg.models && cfg.models.length > 0) {
            if (currentMode === 'deepseek') return localStorage.getItem('ds_model') || cfg.models[0];
            if (currentMode === 'zhipu' || currentMode === 'openrouter' || currentMode === 'google' || currentMode === 'qwen' || currentMode === 'qiniu' || currentMode === 'shiyun' || currentMode === 'thinkflow' || currentMode === 'volcano' || currentMode === 'mimo' || currentMode === 'claude')
                return localStorage.getItem('zp_model') || cfg.models[0];
            if (currentMode === 'openai') return localStorage.getItem('oa_model') || cfg.models[0];
            return cfg.models[0];
        }
        if (currentMode === 'custom') return localStorage.getItem('cu_modelName') || '';
        return '';
    }

    function getMemorySnippet() {
        const mem = localStorage.getItem('accumulated_memory');
        if (!mem) return '';
        const snippet = mem.slice(-5000);
        return `\n\n【最近的记忆片段】\n${snippet}`;
    }

    async function sendMessage() {
        const text = messageInput.value.trim(); if(!text && !pendingImage) return;
        const userText = text || (pendingImage ? '（图片）' : ''); const imgToSend = pendingImage; pendingImage = null;
        if(text || imgToSend) addMessage('user', userText);
        messageInput.value = ''; setLoading(true);
        const loadDiv = document.createElement('div'); loadDiv.className = 'message ai-message';
        loadDiv.innerHTML = '<div class="bubble"><div class="loading-dots"><span></span><span></span><span></span></div></div>';
        messagesContainer.appendChild(loadDiv); messagesContainer.scrollTop = messagesContainer.scrollHeight;
        try {
            const cfg = getCurrentModelConfig();
            const apiKey = getCurrentApiKey();
            const baseUrl = getCurrentBaseUrl();
            const model = getCurrentModel();
            const prompt = (localStorage.getItem('systemPrompt') || DEFAULT_PROMPT) + getMemorySnippet();
            if (!apiKey && currentMode !== 'free') throw new Error('请先在设置中填入 API Key');
            const messages = [{role:'system', content:prompt}, ...conversationHistory.filter(m => !m.image && m.role !== 'system')];
            if (imgToSend) {
                messages.push({role:'user', content: [{type:'text', text:userText}, {type:'image_url', image_url:{url:imgToSend}}] });
            } else {
                messages.push({role:'user', content:userText});
            }
            let url = baseUrl.replace(/\/+$/, '');
            if (!url.endsWith('/chat/completions')) url += '/chat/completions';
            const headers = { 'Content-Type': 'application/json' };
            if (cfg.auth === 'none') {
                // 无认证
            } else if (cfg.auth === 'x-api-key') {
                headers['x-api-key'] = apiKey;
            } else {
                headers['Authorization'] = `Bearer ${apiKey}`;
            }
            const res = await fetch(url, {
                method:'POST', headers,
                body: JSON.stringify({model, messages, stream:false})
            });
            if (!res.ok) { const errText = await res.text(); throw new Error(`API错误(${res.status}): ${errText}`); }
            const data = await res.json(); const reply = data.choices[0].message.content;
            loadDiv.remove(); addMessage('assistant', reply);
        } catch(err) { loadDiv.remove(); addMessage('assistant', '抱歉，请求失败：' + err.message); }
        setLoading(false);
    }

    function setLoading(loading) { sendBtn.disabled = loading; messageInput.disabled = loading; }

    plusBtn.addEventListener('click', (e) => { e.stopPropagation(); actionMenu.classList.toggle('show'); });
    document.body.addEventListener('click', (e) => { if(!actionMenu.contains(e.target) && e.target !== plusBtn) actionMenu.classList.remove('show'); });
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    // ---------- 模型编辑（弹窗） ----------
    function saveCurrentEditorToModelConfigs() {
        const inputs = document.querySelectorAll('#modelEditorContainer input');
        inputs.forEach(inp => {
            const idx = parseInt(inp.dataset.idx);
            const field = inp.dataset.field;
            if (!isNaN(idx) && field && idx >= 0 && idx < modelConfigs.length) {
                if (field === 'models') {
                    modelConfigs[idx].models = inp.value.split(',').map(s => s.trim()).filter(s => s);
                } else {
                    modelConfigs[idx][field] = inp.value;
                }
            }
        });
        saveModelConfigs();
    }

    function openModelEditor() {
        const container = document.getElementById('modelEditorContainer');
        container.innerHTML = '';
        modelConfigs.forEach((cfg, idx) => {
            const row = document.createElement('div'); row.className = 'model-edit-row';
            row.innerHTML = `
                <input placeholder="ID" value="${cfg.id}" data-field="id" data-idx="${idx}">
                <input placeholder="名称" value="${cfg.name}" data-field="name" data-idx="${idx}">
                <input placeholder="端点" value="${cfg.endpoint}" data-field="endpoint" data-idx="${idx}">
                <input placeholder="模型(逗号分隔)" value="${cfg.models.join(',')}" data-field="models" data-idx="${idx}">
                <input placeholder="认证方式" value="${cfg.auth}" data-field="auth" data-idx="${idx}">
                <input placeholder="备注" value="${cfg.note || ''}" data-field="note" data-idx="${idx}">
                <button onclick="deleteModel(${idx})">删除</button>
            `;
            container.appendChild(row);
        });
        document.getElementById('modelEditorModal').classList.add('show');
    }

    function closeModelEditor(saveAndClose = true) {
        if (saveAndClose) {
            saveCurrentEditorToModelConfigs();
            populateSelectors();
        }
        document.getElementById('modelEditorModal').classList.remove('show');
    }

    function addNewModel() {
        saveCurrentEditorToModelConfigs();
        modelConfigs.push({ id: 'new_' + Date.now(), name: '新模型', endpoint: '', auth: 'Bearer', models: [], note: '' });
        saveModelConfigs();
        openModelEditor();
    }

    function deleteModel(idx) {
        if (confirm('确定删除该模型？')) {
            saveCurrentEditorToModelConfigs();
            modelConfigs.splice(idx, 1);
            saveModelConfigs();
            openModelEditor();
        }
    }

    loadSettings();
    loadHistory();
    populateSelectors();
</script>
</body>
</html>
